{% extends 'base.html' %} {% block header %}
<h1>{% block title %}Stocks{% endblock %}</h1>
{% if g.user %}
<a class="action" href="{{ url_for('stock.create') }}">New</a>
{% endif %} {% endblock %} {% block content %} {% for stock in stocks %}
<article class="post">
  <header>
    <div>
      <h1>{{ stock['symbol'] }}</h1>
      <div class="about"></div>
    </div>
  </header>
  <p class="body">{{ stock['link'] }}</p>
</article>
{% if not loop.last %}
<hr />
{% endif %} {% endfor %} {% endblock %}
